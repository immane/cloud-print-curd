version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cloud_print
      MYSQL_USER: print_user
      MYSQL_PASSWORD: print_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    # Work around an incompatible cryptography wheel in this environment.
    # aiomysql/pymysql can run without cryptography when using
    # mysql_native_password auth.
    command: sh -c "python -m pip uninstall -y cryptography >/dev/null 2>&1 || true; uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --loop asyncio --http h11"
    environment:
      - DATABASE_URL=mysql+aiomysql://print_user:print_pass@mysql:3306/cloud_print
      - DATABASE_URL_SYNC=mysql+pymysql://print_user:print_pass@mysql:3306/cloud_print
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT=http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    # The worker module creates and configures the RedisBroker from settings.REDIS_URL,
    # so the dramatiq CLI should be invoked without the --broker flag which newer
    # dramatiq CLI installs may not accept. Rely on REDIS_URL environment variable
    # provided below instead.
    command: sh -c "python -m pip uninstall -y cryptography >/dev/null 2>&1 || true; dramatiq src.app.worker"
    environment:
      - DATABASE_URL=mysql+aiomysql://print_user:print_pass@mysql:3306/cloud_print
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT=http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mysql_data:
  redis_data:
  minio_data:
